name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        # Dummy keys for import-time clients are also set by tests/conftest.py;
        # exported here too so the suite is self-contained in CI.
        env:
          OPENAI_API_KEY: dummy
          ANTHROPIC_API_KEY: dummy
          SERPER_API_KEY: dummy
          VOYAGE_API_KEY: dummy
        run: pytest
