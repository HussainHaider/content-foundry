version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - BUFFER_TOKEN=${BUFFER_TOKEN}
      - BUFFER_PROFILE_IDS=${BUFFER_PROFILE_IDS}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      # Reach the FastAPI publisher over the compose network (no Storyblok token here)
      - PUBLISHER_API_URL=http://api:8000
      - PUBLISHER_API_KEY=${PUBLISHER_API_KEY}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./brand_docs:/app/brand_docs
      - ./output:/app/output

  # Storyblok publishing service — the ONLY process that holds the Management token
  api:
    build: .
    command: >
      uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - STORYBLOK_MANAGEMENT_TOKEN=${STORYBLOK_MANAGEMENT_TOKEN}
      - STORYBLOK_SPACE_ID=${STORYBLOK_SPACE_ID}
      - STORYBLOK_REGION=${STORYBLOK_REGION}
      - STORYBLOK_BLOG_PARENT_ID=${STORYBLOK_BLOG_PARENT_ID}
      - PUBLISHER_API_KEY=${PUBLISHER_API_KEY}

volumes:
  qdrant_data:
